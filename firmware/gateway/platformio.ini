[platformio]
default_envs = gateway

[env:gateway]
platform   = espressif32
board      = esp32dev
framework  = arduino

; Gateway TTGo TBeam 1.2
upload_port   = COM7
upload_speed  = 115200
monitor_port  = COM7
monitor_speed = 115200

lib_deps =
    jgromes/RadioLib@^6.6.0
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -DCORE_DEBUG_LEVEL=0

[env:gateway_ota]
extends = env:gateway
upload_protocol = espota
; Set to the gateway IP shown in boot logs when OTA mode is active.
upload_port = 192.168.0.202
